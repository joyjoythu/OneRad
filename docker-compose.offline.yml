# ============================================================
# OneRad 离线部署 —— 评委使用说明
# ============================================================
#
# 前置准备（只需做一次）：
# 1. 导入镜像：
#    docker load < autoradiomics.tar.gz
#
# 2. 设置 API Key：
#    export DEEPSEEK_API_KEY=sk-你的密钥
#    （Windows CMD 用 set，PowerShell 用 $env:）
#
# 3. 【重要】修改下方 volumes 中的宿主机路径：
#    把 D:\你的影像数据目录 替换为评委本机实际路径
#    例如：Linux/Mac → /home/judge/images
#          Windows   → D:\MedicalImages  （或 /mnt/d/MedicalImages for WSL2）
#
# 启动：
#    docker compose -f docker-compose.offline.yml up -d
#
# 访问：
#    http://localhost:8000
#    → 创建项目 → 点"浏览" → 左侧选择 📂 /data/input → 选择数据目录
#
# 停止：
#    docker compose -f docker-compose.offline.yml down
# ============================================================

services:
  autoradiomics:
    image: autoradiomic-agent-autoradiomics:latest
    container_name: autoradiomics
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据（数据库、设置）
      - ./data:/app/data
      # 分析结果输出
      - ./output:/app/output
      # ★ 评委将下面的宿主机路径替换为自己的影像数据目录 ★
      - D:\你的影像数据目录:/data/input
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - BASE_URL=${BASE_URL:-https://api.deepseek.com/v1}
      - ONERAD_ALLOW_REMOTE_FS=1
      - ONERAD_FS_ROOTS=/data/input
